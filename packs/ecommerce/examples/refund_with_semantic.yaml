id: ecommerce_refund_flow_semantic
name: E-commerce refund flow with semantic assets
domain: ecommerce
for_each: order
duration: 30m
seed: 20260628

entities:
  customer:
    count: 10
    type: customer

  product:
    count: 5
    type: product

  order:
    count: 20
    type: order

  payment:
    count: 20
    type: payment

  refund:
    count: 5
    type: refund

  ticket:
    count: 5
    type: ticket

sources:
  - id: order-service
    type: service
    role: order_service
    rate:
      base_qps: 100
      burst_qps: 800
      jitter: 0.1
    outputs:
      - type: jsonl
        path: ./out/orders.jsonl

  - id: ticket-service
    type: service
    role: ticket_service
    rate:
      base_qps: 20
      burst_qps: 100
      jitter: 0.2
    outputs:
      - type: jsonl
        path: ./out/tickets.jsonl

timeline:
  - id: create_order
    at: "00:00:00"
    event: order.created
    source: order-service
    entity_refs:
      order: "$flow"
      customer: "$entity.customer"
    attributes:
      amount: 299.0
      currency: CNY

  - id: pay_order
    after: create_order
    delay: "1m..5m"
    event: order.paid
    source: order-service
    entity_refs:
      order: "$ref.create_order.order"
      customer: "$ref.create_order.customer"
      payment: "$new.payment"
    attributes:
      method: alipay

  - id: request_refund
    after: pay_order
    delay: "5m..20m"
    probability: 0.2
    event: refund.requested
    source: order-service
    entity_refs:
      order: "$ref.create_order.order"
      customer: "$ref.create_order.customer"
      refund: "$new.refund"
    attributes:
      reason: Product did not match description
    semantic:
      type: refund.reason
      prompt: "Write a concise refund reason in Chinese."

  - id: create_ticket
    after: request_refund
    delay: "10s..1m"
    probability: 0.5
    event: ticket.created
    source: ticket-service
    entity_refs:
      order: "$ref.create_order.order"
      customer: "$ref.create_order.customer"
      ticket: "$new.ticket"
    attributes:
      subject: Refund request
      priority: medium
    semantic:
      type: ticket.description
      prompt: "Write a short support ticket description in Chinese."

rules:
  - id: order_must_be_paid_before_refund
    type: event_after
    event: refund.requested
    after: order.paid
    scope: order

  - id: ticket_must_reference_existing_order
    type: required_entity_ref
    event: ticket.created
    ref: order
