profiles:
  shopping_background:
    description: >-
      Normal browsing, cart, and order background noise for e-commerce
      transaction scenarios.
    noise:
      enabled: true
      ratio: 0.5
      events:
        - event: product.viewed
          weight: 5
          source: order-service
          entity_refs:
            customer: "$entity.customer"
            product: "$entity.product"
        - event: cart.updated
          weight: 3
          source: order-service
          entity_refs:
            customer: "$entity.customer"
            product: "$entity.product"
        - event: order.created
          weight: 4
          source: order-service
          entity_refs:
            order: "$entity.order"
            customer: "$entity.customer"
        - event: order.paid
          weight: 2
          source: order-service
          entity_refs:
            order: "$entity.order"
            customer: "$entity.customer"
    jitter:
      enabled: true
      max_offset: 5s
      preserve_order: true
