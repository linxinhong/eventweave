rules:
  - id: order_must_be_paid_before_refund
    type: event_after
    description: Refund cannot be requested before order is paid.
    attributes:
      event: refund.requested
      after: order.paid
      scope: order

  - id: refund_amount_must_not_exceed_payment_amount
    type: field_lte_ref
    description: Refund amount cannot exceed payment amount.
    attributes:
      event: refund.requested
      field: refund.amount
      ref_event: order.paid
      ref_field: payment.amount
      scope: order

  - id: ticket_must_reference_existing_order
    type: required_entity_ref
    description: Ticket must reference an existing order.
    attributes:
      event: ticket.created
      ref: order
