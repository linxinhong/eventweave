# Local demo stack for EventWeave multi-source runtime observability.
#
# Usage:
#   cd examples/demo-stack
#   docker compose up -d
#
# Then run the EventWeave multi-source server on the host:
#   eventweave-runtime serve dist/security_demo_multi_source \
#     --server-config examples/demo-stack/security_multi_source.yaml \
#     --metrics-addr 0.0.0.0:9090
#
# Grafana credentials are loaded from the .env file created by run_demo.sh.

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: eventweave-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:19092
    ports:
      - "19092:9092"
      - "19644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: eventweave-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.4
    container_name: eventweave-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  http-sse-consumer:
    image: python:3.12-slim
    container_name: eventweave-http-sse-consumer
    command:
      - python
      - /app/http_sse_consumer.py
      - http://host.docker.internal:8081/events
    volumes:
      - ./receivers:/app:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - grafana

  syslog-tcp-receiver:
    image: python:3.12-slim
    container_name: eventweave-syslog-tcp-receiver
    command:
      - python
      - /app/syslog_tcp_receiver.py
      - host.docker.internal
      - "5515"
    volumes:
      - ./receivers:/app:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  syslog-udp-receiver:
    image: python:3.12-slim
    container_name: eventweave-syslog-udp-receiver
    command:
      - python
      - /app/syslog_udp_receiver.py
      - host.docker.internal
      - "5514"
    volumes:
      - ./receivers:/app:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
